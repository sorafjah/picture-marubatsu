<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>◯✕クイズアプリ</title>
    <style>
        /* --- 基本スタイルとUDフォントの設定 --- */
        * {
            box-sizing: border-box;
            /* ダブルタップによるズームをブラウザレベルで無効化 */
            touch-action: manipulation;
            -webkit-user-select: none; /* テキスト選択による誤動作防止 */
            user-select: none;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #f0f8ff; /* 優しく見やすい淡いブルー */
            font-family: 'BIZ UDPGothic', 'UD DigiKyouka', 'Hiragino Kaku Gothic ProN', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- メインコンテンツのレイアウト --- */
        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        /* 画像表示エリア */
        .image-area {
            position: relative;
            width: 100%;
            height: 55vh;
            background-color: #e0e0e0;
            border: 6px dashed #aaaaaa;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
        }

        /* PCでの未選択時のホバー効果 */
        .image-area:not(.has-image):hover {
            background-color: #d5e5f5;
            border-color: #4a90e2;
        }

        /* 画像が読み込まれたらエリア自体の点線や背景は透明にする */
        .image-area.has-image {
            border: none;
            background-color: transparent;
            cursor: default;
        }

        /* 初期状態のプレースホルダー */
        .placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #777777;
            text-align: center;
            pointer-events: none; /* クリックイベントを通す */
        }

        .placeholder-icon {
            font-size: 80px;
            margin-bottom: 10px;
        }

        .placeholder-text {
            font-size: 28px;
            font-weight: bold;
        }

        .placeholder-subtext {
            font-size: 16px;
            font-weight: normal;
            color: #888888;
            margin-top: 8px;
        }

        /* カメラ起動時の映像表示 */
        #camera-video {
            display: none;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 24px;
            border: 6px solid #ff9800;
        }

        /* 取り込まれた画像 (アスペクト比を維持して最大表示) */
        #preview-image {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            display: none;
            border-radius: 18px;
            transition: border 0.2s;
        }

        /* 画像がセットされたとき、画像にぴったり沿う青い枠線 */
        .image-area.has-image #preview-image {
            border: 6px solid #4a90e2;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        /* --- 演出用の黄緑の大きなマル（◯） --- */
        .circle-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 260px;
            height: 260px;
            border: 35px solid #7cb342; /* パッと見やすい黄緑色 */
            border-radius: 50%;
            opacity: 0;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            pointer-events: none;
            z-index: 10;
        }

        .circle-overlay.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        /* 次へを押した時の「上に少し上がりつつ消える」アニメーション */
        .fade-out-animation {
            animation: fadeOutUp 0.6s forwards cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes fadeOutUp {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -150%) scale(0.7);
                opacity: 0;
            }
        }

        /* --- もっとハッピーなキラキラエフェクトの装飾 --- */
        .sparkle {
            position: absolute;
            pointer-events: none;
            z-index: 11;
            font-size: 30px;
            opacity: 0;
        }

        @keyframes sparkle-burst {
            0% {
                transform: translate(-50%, -50%) scale(0) rotate(0deg);
                opacity: 0;
            }
            15% {
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(1.2) rotate(var(--rot));
                opacity: 0;
            }
        }

        /* --- 演出用の「残念な感じのエフェクト」（✕） --- */
        /* JSで写真のサイズにぴったり合わせるよう動的に配置します */
        .batsu-overlay {
            position: absolute;
            background-color: rgba(30, 38, 58, 0.7); /* どんより暗い青 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 10;
            border-radius: 18px; /* preview-imageの角丸に合わせる */
        }

        .batsu-overlay.show {
            opacity: 1;
        }

        /* 次へを押した時の残念エフェクト消去用 */
        .batsu-overlay.fade-out {
            animation: fadeOutBatsu 0.4s forwards ease;
        }

        @keyframes fadeOutBatsu {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* やれやれポーズの人（🤷） 写真が小さくてもはみ出ないようレスポンシブサイズに設定 */
        .batsu-emoji {
            font-size: clamp(60px, 15vh, 120px);
            animation: shiver 0.5s infinite;
        }

        .batsu-text {
            font-size: clamp(20px, 4vh, 36px);
            font-weight: bold;
            color: #8fa4c1;
            margin-top: 10px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
        }

        /* ガタガタ震えるアニメーション */
        @keyframes shiver {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-4px, 2px) rotate(-3deg); }
            40% { transform: translate(4px, -2px) rotate(3deg); }
            60% { transform: translate(-3px, -2px) rotate(-1deg); }
            80% { transform: translate(3px, 2px) rotate(2deg); }
        }

        /* --- 操作・コントロールエリア --- */
        .control-area {
            width: 100%;
            display: flex;
            justify-content: center;
            min-height: 120px;
        }

        /* ファイル入力（隠し要素） */
        input[type="file"] {
            display: none;
        }

        /* 共通ボタンスタイル（大きく押しやすく） */
        .btn {
            font-family: inherit;
            font-size: 32px;
            font-weight: bold;
            padding: 20px 40px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 8px 0 #b0b0b0;
            transition: transform 0.1s, box-shadow 0.1s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b0b0b0;
        }

        /* 初期ボタンのカラー */
        .btn-camera {
            background-color: #ff9800;
            color: white;
            box-shadow: 0 8px 0 #e65100;
        }
        .btn-camera:active { box-shadow: 0 4px 0 #e65100; }

        .btn-gallery {
            background-color: #03a9f4;
            color: white;
            box-shadow: 0 8px 0 #01579b;
        }
        .btn-gallery:active { box-shadow: 0 4px 0 #01579b; }

        /* カメラ撮影中用のボタン（オレンジ色に変更） */
        .btn-shutter {
            background-color: #ff9800;
            color: white;
            box-shadow: 0 8px 0 #e65100;
        }
        .btn-shutter:active { box-shadow: 0 4px 0 #e65100; }

        .btn-cancel {
            background-color: #757575;
            color: white;
            box-shadow: 0 8px 0 #424242;
        }
        .btn-cancel:active { box-shadow: 0 4px 0 #424242; }

        .initial-buttons, .camera-buttons {
            display: flex;
            gap: 25px;
        }

        .camera-buttons {
            display: none;
        }

        /* --- 見た目では分からない隠しボタン --- */
        .hidden-quiz-trigger {
            display: none;
            width: 100%;
            max-width: 600px;
            height: 100px;
            position: relative;
            cursor: pointer;
            background-color: transparent;
            border: none;
            box-shadow: none;
        }

        /* 中央に表示される「⭕️か❌か」のテキスト */
        .quiz-text-label {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: #333333;
            letter-spacing: 12px;
            pointer-events: none; /* 文字の後ろのボタンを押せるように */
            z-index: 2;
            text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff;
        }

        /* 内部で左右に分割された透明なボタン（薄い枠なども一切表示しない） */
        .secret-hit-box {
            position: absolute;
            top: 0;
            height: 100%;
            width: 50%;
            z-index: 1;
            background: transparent; 
            border-radius: 20px;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .hit-left { left: 0; }    /* 左側：「⭕️か」に連動 */
        .hit-right { right: 0; }  /* 右側：「❌か」に連動 */

        /* つぎへボタン */
        .btn-next {
            display: none;
            background-color: #4caf50;
            color: white;
            font-size: 40px;
            padding: 25px 100px;
            box-shadow: 0 8px 0 #1b5e20;
        }
        .btn-next:active { box-shadow: 0 4px 0 #1b5e20; }

        /* キャプチャ用の隠しキャンバス */
        #capture-canvas {
            display: none;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="image-area" id="image-area">
        <div class="placeholder" id="placeholder">
            <div class="placeholder-icon">📸</div>
            <div class="placeholder-text">がぞうを いれてね</div>
            <div class="placeholder-subtext">（クリックや ファイルをドロップしてもOK）</div>
        </div>
        
        <!-- PC・スマホのカメラプレビュー用 -->
        <video id="camera-video" autoplay playsinline></video>
        
        <!-- クイズとして表示する画像 -->
        <img id="preview-image" alt="クイズ画像">
        
        <!-- 正解(〇)時のエフェクト -->
        <div class="circle-overlay" id="circle-overlay"></div>
        
        <!-- 残念(×)時のエフェクト -->
        <div class="batsu-overlay" id="batsu-overlay">
            <div class="batsu-emoji">🤷</div>
            <div class="batsu-text">ざんねん...</div>
        </div>
    </div>

    <div class="control-area">
        <!-- 初期選択ボタン -->
        <div class="initial-buttons" id="initial-buttons">
            <button class="btn btn-camera" id="btn-start-camera">
                📸 しゃしんをとる
            </button>
            <label class="btn btn-gallery">
                🖼️ がぞうをえらぶ
                <input type="file" accept="image/*" id="input-gallery">
            </label>
        </div>

        <!-- カメラ撮影中のコントロールボタン -->
        <div class="camera-buttons" id="camera-buttons">
            <button class="btn btn-shutter" id="btn-shutter">
                📸 パシャ！
            </button>
            <button class="btn btn-cancel" id="btn-cancel-camera">
                やめる
            </button>
        </div>

        <!-- 〇×非表示クイズ選択肢 -->
        <div class="hidden-quiz-trigger" id="hidden-quiz-trigger">
            <div class="quiz-text-label">⭕️か❌か</div>
            <div class="secret-hit-box hit-left" id="hit-maru" title="まる (キーボードの 左矢印キー でもOK)"></div>
            <div class="secret-hit-box hit-right" id="hit-batsu" title="ばつ (キーボードの 右矢印キー でもOK)"></div>
        </div>

        <!-- つぎへボタン -->
        <button class="btn btn-next" id="btn-next">つぎへ</button>
    </div>
</div>

<!-- 撮影時に一時利用するキャンバス -->
<canvas id="capture-canvas"></canvas>

<!-- バックアップ用のファイルカメラインプット -->
<input type="file" accept="image/*" capture="camera" id="fallback-camera-input">

<script>
    // --- 要素の取得 ---
    const btnStartCamera = document.getElementById('btn-start-camera');
    const inputGallery = document.getElementById('input-gallery');
    const fallbackCameraInput = document.getElementById('fallback-camera-input');
    const imageArea = document.getElementById('image-area');
    const placeholder = document.getElementById('placeholder');
    const cameraVideo = document.getElementById('camera-video');
    const previewImage = document.getElementById('preview-image');
    const circleOverlay = document.getElementById('circle-overlay');
    const batsuOverlay = document.getElementById('batsu-overlay');
    const captureCanvas = document.getElementById('capture-canvas');
    
    const initialButtons = document.getElementById('initial-buttons');
    const cameraButtons = document.getElementById('camera-buttons');
    const btnShutter = document.getElementById('btn-shutter');
    const btnCancelCamera = document.getElementById('btn-cancel-camera');
    const hiddenQuizTrigger = document.getElementById('hidden-quiz-trigger');
    const hitMaru = document.getElementById('hit-maru');
    const hitBatsu = document.getElementById('hit-batsu');
    const btnNext = document.getElementById('btn-next');

    let localStream = null;
    let audioCtx = null;
    let currentFacingMode = 'user'; // デフォルトはインカメラ ('user')

    // --- iOS端末 (iPhone/iPad/iPod) の判定 ---
    function isIOS() {
        return /iPad|iPhone|iPod/.test(navigator.userAgent) || 
               (navigator.userAgent.includes("Mac") && "ontouchend" in document);
    }

    // --- Web Audio API（効果音のコード生成） ---
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    // 「ピンポーン」の音
    function playMaruSound() {
        initAudio();
        const now = audioCtx.currentTime;
        
        const osc1 = audioCtx.createOscillator();
        const gain1 = audioCtx.createGain();
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(659.25, now); // E5
        gain1.gain.setValueAtTime(0.3, now);
        gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
        osc1.connect(gain1);
        gain1.connect(audioCtx.destination);
        osc1.start(now);
        osc1.stop(now + 0.4);

        const osc2 = audioCtx.createOscillator();
        const gain2 = audioCtx.createGain();
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(783.99, now + 0.15); // G5
        gain2.gain.setValueAtTime(0.3, now + 0.15);
        gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.7);
        osc2.connect(gain2);
        gain2.connect(audioCtx.destination);
        osc2.start(now + 0.15);
        osc2.stop(now + 0.7);
    }

    // 「フニャフニャ〜（気の抜けた音）」
    function playBatsuSound() {
        initAudio();
        const now = audioCtx.currentTime;
        const duration = 1.0; 

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'triangle'; 
        
        osc.frequency.setValueAtTime(320, now);
        osc.frequency.linearRampToValueAtTime(110, now + duration);
        
        const lfo = audioCtx.createOscillator();
        const lfoGain = audioCtx.createGain();
        lfo.frequency.setValueAtTime(9, now); 
        lfoGain.gain.setValueAtTime(35, now); 
        
        lfo.connect(lfoGain);
        lfoGain.connect(osc.frequency);
        
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.linearRampToValueAtTime(0.18, now + 0.2);
        gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        lfo.start(now);
        osc.start(now);
        
        lfo.stop(now + duration);
        osc.stop(now + duration);
    }

    // --- もっとハッピーなキラキラエフェクト生成関数 ---
    function createHappySparkles() {
        const colors = ['#FFD700', '#FF69B4', '#00FFFF', '#ADFF2F', '#FF4500', '#9370DB', '#32CD32'];
        const shapes = ['★', '🌸', '✨', '♦', '●', '🎵'];
        const numSparkles = 25; 

        for (let i = 0; i < numSparkles; i++) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            
            sparkle.textContent = shapes[Math.floor(Math.random() * shapes.length)];
            sparkle.style.color = colors[Math.floor(Math.random() * colors.length)];
            
            sparkle.style.left = '50%';
            sparkle.style.top = '50%';
            
            const angle = Math.random() * Math.PI * 2;
            const distance = 100 + Math.random() * 200; 
            const tx = Math.cos(angle) * distance + 'px';
            const ty = Math.sin(angle) * distance + 'px';
            const rot = (Math.random() * 360 - 180) + 'deg';
            
            sparkle.style.setProperty('--tx', tx);
            sparkle.style.setProperty('--ty', ty);
            sparkle.style.setProperty('--rot', rot);
            
            const animDuration = 0.6 + Math.random() * 0.4;
            sparkle.style.animation = `sparkle-burst ${animDuration}s forwards cubic-bezier(0.1, 0.8, 0.3, 1)`;
            
            imageArea.appendChild(sparkle);
            
            setTimeout(() => {
                sparkle.remove();
            }, animDuration * 1000);
        }
    }

    // --- 残念エフェクト（暗い背景）を写真のサイズ・位置にぴったり追従させる関数 ---
    function positionBatsuOverlay() {
        if (imageArea.classList.contains('has-image') && previewImage.style.display !== 'none') {
            const rect = previewImage.getBoundingClientRect();
            const parentRect = imageArea.getBoundingClientRect();
            
            batsuOverlay.style.width = rect.width + 'px';
            batsuOverlay.style.height = rect.height + 'px';
            batsuOverlay.style.top = (rect.top - parentRect.top) + 'px';
            batsuOverlay.style.left = (rect.left - parentRect.left) + 'px';
        }
    }

    previewImage.addEventListener('load', positionBatsuOverlay);
    window.addEventListener('resize', positionBatsuOverlay);

    // --- カメラ制御処理 ---
    async function startCamera() {
        placeholder.style.display = 'none';
        previewImage.style.display = 'none';
        cameraVideo.style.display = 'block';
        
        initialButtons.style.display = 'none';
        cameraButtons.style.display = 'flex';

        // iOS端末の場合、初期起動は背面カメラをデフォルトにする
        if (isIOS()) {
            currentFacingMode = 'environment';
        } else {
            currentFacingMode = 'user'; // PCやAndroidなどは標準インカメラ
        }

        try {
            const constraints = {
                video: {
                    facingMode: currentFacingMode,
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                },
                audio: false
            };
            
            localStream = await navigator.mediaDevices.getUserMedia(constraints);
            cameraVideo.srcObject = localStream;

            // プレビューの左右ミラー反転設定（インカメラ 'user' の時だけ反転させる）
            if (currentFacingMode === 'user') {
                cameraVideo.style.transform = 'scaleX(-1)';
            } else {
                cameraVideo.style.transform = 'scaleX(1)';
            }
        } catch (err) {
            console.warn("ブラウザから直接カメラを起動できませんでした。通常のカメラ起動に切り替えます。", err);
            stopCamera();
            fallbackCameraInput.click();
        }
    }

    function stopCamera() {
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        cameraVideo.srcObject = null;
        cameraVideo.style.display = 'none';
    }

    // シャッターを切して写真画像を取得する
    function takePhoto() {
        if (!localStream) return;

        captureCanvas.width = cameraVideo.videoWidth;
        captureCanvas.height = cameraVideo.videoHeight;
        
        const ctx = captureCanvas.getContext('2d');
        
        // インカメラ(user)の時は自撮り用に左右反転、背面(environment)の時はそのままキャプチャする
        if (currentFacingMode === 'user') {
            ctx.translate(captureCanvas.width, 0);
            ctx.scale(-1, 1);
        }
        
        ctx.drawImage(cameraVideo, 0, 0, captureCanvas.width, captureCanvas.height);
        
        const dataUrl = captureCanvas.toDataURL('image/png');
        
        previewImage.src = dataUrl;
        previewImage.style.display = 'block';
        imageArea.classList.add('has-image');
        
        stopCamera();
        cameraButtons.style.display = 'none';
        hiddenQuizTrigger.style.display = 'block';
    }

    btnStartCamera.addEventListener('click', startCamera);
    btnShutter.addEventListener('click', takePhoto);

    btnCancelCamera.addEventListener('click', () => {
        stopCamera();
        cameraButtons.style.display = 'none';
        initialButtons.style.display = 'flex';
        placeholder.style.display = 'flex';
    });

    fallbackCameraInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            handleFile(e.target.files[0]);
        } else {
            resetApp();
        }
    });

    // --- 画像のファイル読み込み ---
    function handleFile(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            previewImage.src = e.target.result;
            previewImage.style.display = 'block';
            placeholder.style.display = 'none';
            imageArea.classList.add('has-image');

            initialButtons.style.display = 'none';
            hiddenQuizTrigger.style.display = 'block';
        }
        reader.readAsDataURL(file);
    }

    inputGallery.addEventListener('change', (e) => handleFile(e.target.files[0]));

    // --- PC向け：エリアクリックでのギャラリー起動 & ドラッグ＆ドロップ対応 ---
    imageArea.addEventListener('click', () => {
        if (!localStream && !imageArea.classList.contains('has-image')) {
            inputGallery.click();
        }
    });

    imageArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        if (!localStream && !imageArea.classList.contains('has-image')) {
            imageArea.style.borderColor = '#4a90e2';
            imageArea.style.backgroundColor = '#e0f0ff';
        }
    });

    imageArea.addEventListener('dragleave', (e) => {
        e.preventDefault();
        if (!localStream && !imageArea.classList.contains('has-image')) {
            imageArea.style.borderColor = '#aaaaaa';
            imageArea.style.backgroundColor = '#e0e0e0';
        }
    });

    imageArea.addEventListener('drop', (e) => {
        e.preventDefault();
        if (!localStream && !imageArea.classList.contains('has-image')) {
            imageArea.style.borderColor = '#aaaaaa';
            imageArea.style.backgroundColor = '#e0e0e0';
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        }
    });

    // --- クイズのギミック処理 ---

    // 「⭕️か」側（左側）
    function handleMaruSelect() {
        playMaruSound();
        circleOverlay.classList.add('show');
        createHappySparkles();
        showNextPhase();
    }

    // 「❌か」側（右側）
    function handleBatsuSelect() {
        playBatsuSound();
        positionBatsuOverlay();
        batsuOverlay.classList.add('show');
        showNextPhase();
    }

    hitMaru.addEventListener('click', (e) => {
        e.stopPropagation();
        handleMaruSelect();
    });

    hitBatsu.addEventListener('click', (e) => {
        e.stopPropagation();
        handleBatsuSelect();
    });

    function showNextPhase() {
        hiddenQuizTrigger.style.display = 'none';
        btnNext.style.display = 'inline-flex';
    }

    // --- キーボードでの操作対応 (PC用) ---
    document.addEventListener('keydown', (e) => {
        if (hiddenQuizTrigger.style.display === 'block') {
            if (e.key === 'ArrowLeft') {
                handleMaruSelect();
            } else if (e.key === 'ArrowRight') {
                handleBatsuSelect();
            }
        } else if (btnNext.style.display === 'inline-flex') {
            if (e.key === 'Enter' || e.key === ' ') {
                btnNext.click();
            }
        }
    });

    // --- リセット＆アニメーション処理（「つぎへ」ボタンクリック時） ---
    btnNext.addEventListener('click', () => {
        const isMaruActive = circleOverlay.classList.contains('show');
        const isBatsuActive = batsuOverlay.classList.contains('show');

        btnNext.style.display = 'none';

        if (isMaruActive) {
            circleOverlay.classList.remove('show');
            circleOverlay.classList.add('fade-out-animation');
            
            const sparkles = document.querySelectorAll('.sparkle');
            sparkles.forEach(s => {
                s.style.transition = 'all 0.5s ease';
                s.style.transform = 'translateY(-150px)';
                s.style.opacity = '0';
            });

            setTimeout(() => {
                resetApp();
                circleOverlay.classList.remove('fade-out-animation');
            }, 600);
            
        } else if (isBatsuActive) {
            batsuOverlay.classList.add('fade-out');
            batsuOverlay.classList.remove('show');

            setTimeout(() => {
                resetApp();
                batsuOverlay.classList.remove('fade-out');
            }, 400);
        } else {
            resetApp();
        }
    });

    // アプリを初期状態に完全リセットする関数
    function resetApp() {
        stopCamera();
        previewImage.src = '';
        previewImage.style.display = 'none';
        placeholder.style.display = 'flex';
        imageArea.classList.remove('has-image');
        circleOverlay.classList.remove('show', 'fade-out-animation');
        batsuOverlay.classList.remove('show', 'fade-out');
        currentFacingMode = 'user'; // カメラ設定を標準(インカメラ)に戻す

        batsuOverlay.style.width = '';
        batsuOverlay.style.height = '';
        batsuOverlay.style.top = '';
        batsuOverlay.style.left = '';

        const sparkles = document.querySelectorAll('.sparkle');
        sparkles.forEach(s => s.remove());

        inputGallery.value = '';
        fallbackCameraInput.value = '';
        btnNext.style.display = 'none';
        cameraButtons.style.display = 'none';
        initialButtons.style.display = 'flex';
    }

    // --- iPad等のダブルタップによるズーム防止策 ---
    let lastTouchEnd = 0;
    document.documentElement.addEventListener('touchend', (event) => {
        const now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) {
            event.preventDefault();
        }
        lastTouchEnd = now;
    }, false);

</script>
</body>
</html>
